<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Interactive rating component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script defer src="main.js"></script>
</head>
<body>
  <!-- Rating state start -->
  <main class="main">
    <div class="main__img">
      <img src="images/icon-star.svg" alt="" class="main__img-icon">
    </div>
    <h1 class="main__title">How did we do?</h1>
    <p class="main__description">Please let us know how we did with your support request. All feedback is appreciated to help us improve our offering!</p>
    <ol class="main__list">
      <li class="main__list-item"><button class="main__list-btn" data-star="1" aria-label="Rate 1 out of 5">1</button></li>
      <li class="main__list-item"><button class="main__list-btn" data-star="2" aria-label="Rate 2 out of 5">2</button></li>
      <li class="main__list-item"><button class="main__list-btn" data-star="3" aria-label="Rate 3 out of 5">3</button></li>
      <li class="main__list-item"><button class="main__list-btn" data-star="4" aria-label="Rate 4 out of 5">4</button></li>
      <li class="main__list-item"><button class="main__list-btn" data-star="5" aria-label="Rate 5 out of 5">5</button></li>
    </ol>
    <button class="main__submit" type="button" disabled>Submit</button>
  </main>
  <!-- Rating state end -->
  <!-- Thank you state start -->
  <section class="thanks-card" hidden>
    <img src="images/illustration-thank-you.svg" alt="" class="thanks__img">
    <p class="thanks__rating">You selected <output class="thanks__rating-response"><!-- Add rating here --></output> out of 5</p>
    <h2 class="thanks__title">Thank you!</h2>
    <p class="thanks__description">We appreciate you taking the time to give a rating. If you ever need more support, don’t hesitate to get in touch!</p>
  </section>
  <!-- Thank you state end -->
</body>
</html>
